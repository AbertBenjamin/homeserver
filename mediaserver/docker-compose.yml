
services:
  gluetun:
    profiles: ["mediaserver"]
    image: qmcgaw/gluetun:v3.41.1
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=mullvad
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
      - SERVER_CITIES=Oslo
      - TZ=Europe/Oslo
    ports:
      - 8081:8080   # qBittorrent web-UI
    networks:
      homeserver_default:
        ipv4_address: 172.18.0.12
    restart: unless-stopped

  qbittorrent:
      profiles: ["mediaserver"]
      image: linuxserver/qbittorrent:5.1.4-r3-ls452
      container_name: qbittorrent
      environment:
        - PUID=1000
        - PGID=1000
        - TZ=Europe/Oslo
        - WEBUI_PORT=8080
      volumes:
        - /opt/homeserver/qbittorrent:/config
        - /mnt/storage/media:/downloads
      network_mode: "service:gluetun"
      depends_on:
        - gluetun
      restart: unless-stopped

  byparr:
    profiles: ["mediaserver"]
    image: ghcr.io/thephaseless/byparr:latest
    container_name: byparr
    environment:
      - TZ=Europe/Oslo
    ports:
      - 8191:8191
    healthcheck:
      test: ["CMD", "curl", "http://localhost:8191/health"]
      interval: 900s
      timeout: 60s
      retries: 3
      start_period: 5s
    networks:
      homeserver_default:
        ipv4_address: 172.18.0.13
    restart: unless-stopped

  prowlarr:
    profiles: ["mediaserver"]
    image: linuxserver/prowlarr:2.3.5.5327-ls144
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Oslo
    volumes:
      - /opt/homeserver/prowlarr:/config
    ports:
      - 9696:9696
    networks:
      homeserver_default:
        ipv4_address: 172.18.0.14
    restart: unless-stopped

  sonarr:
    profiles: ["mediaserver"]
    image: linuxserver/sonarr:4.0.17.2952-ls310
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Oslo
    volumes:
      - /opt/homeserver/sonarr:/config
      - /mnt/storage/media:/media
      - /mnt/storage/media:/downloads
    ports:
      - 8989:8989
    networks:
      homeserver_default:
        ipv4_address: 172.18.0.15
    restart: unless-stopped

  radarr:
    profiles: ["mediaserver"]
    image: linuxserver/radarr:6.1.1.10360-ls300
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Oslo
    volumes:
      - /opt/homeserver/radarr:/config
      - /mnt/storage/media:/media
      - /mnt/storage/media:/downloads
    ports:
      - 7878:7878
    networks:
      homeserver_default:
        ipv4_address: 172.18.0.16
    restart: unless-stopped

  lidarr:
    profiles: ["mediaserver"]
    image: linuxserver/lidarr:3.1.0.4875-ls26
    container_name: lidarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Oslo
    volumes:
      - /opt/homeserver/lidarr:/config
      - /mnt/storage/media:/media
      - /mnt/storage/media:/downloads
    ports:
      - 8686:8686
    networks:
      homeserver_default:
        ipv4_address: 172.18.0.17
    restart: unless-stopped

  jellyfin:
    profiles: ["mediaserver"]
    image: linuxserver/jellyfin:10.11.8ubu2404-ls30
    container_name: jellyfin
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Oslo
    volumes:
      - /opt/homeserver/jellyfin:/config
      - /mnt/storage/media:/media:ro
    ports:
      - 8096:8096
    networks:
      homeserver_default:
        ipv4_address: 172.18.0.18
    restart: unless-stopped

