# .github/dependabot.yml
version: 2
updates:
  # Docker images in docker-compose.yml
  - package-ecosystem: docker-compose
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "03:00"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore"
      include: "scope"
    # Group all Docker updates into a single PR (optional)
    groups:
      docker-images:
        patterns:
          - "*"

  - package-ecosystem: "docker-compose"
    directory: "/terraria"
    schedule:
      interval: "daily"
      time: "03:00"

  - package-ecosystem: "docker-compose"
    directory: "/enshrouded"
    schedule:
      interval: "daily"
      time: "03:00"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "03:00"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore"
      include: "scope"
