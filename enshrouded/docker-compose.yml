services:
  enshrouded:
    profiles: ["games"]
    image: mornedhels/enshrouded-server:1.7.2-proton
    container_name: enshrouded-server
    hostname: enshrouded
    stop_grace_period: 90s
    # ports:
    #   - "15637:15637/udp"
    network_mode: host
    volumes:
      - ~/enshrouded:/opt/enshrouded
    devices:
      - /dev/ntsync:/dev/ntsync
    environment:
      - SERVER_NAME=Enshrouded server
      - UPDATE_CRON=*/30 * * * *
      - TZ=Europe/Oslo
      - RESTART_CRON=0 6 * * * 
      - PUID=4711
      - PGID=4711
      - SERVER_ROLE_0_NAME=Admins
      - SERVER_ROLE_0_PASSWORD=${SERVER_ROLE_0_PASSWORD}
      - SERVER_ROLE_0_CAN_KICK_BAN=true
      - SERVER_ROLE_0_CAN_ACCESS_INVENTORIES=true
      - SERVER_ROLE_0_CAN_EDIT_WORLD=true
      - SERVER_ROLE_0_CAN_EDIT_BASE=true
      - SERVER_ROLE_0_CAN_EXTEND_BASE=true
      - SERVER_ROLE_0_RESERVED_SLOTS=3
      - SERVER_ROLE_1_NAME=Friends
      - SERVER_ROLE_1_PASSWORD=${SERVER_ROLE_1_PASSWORD}
      - SERVER_ROLE_1_CAN_ACCESS_INVENTORIES=true
      - SERVER_ROLE_1_CAN_EDIT_WORLD=true
      - SERVER_ROLE_1_CAN_EDIT_BASE=true
      - SERVER_ROLE_1_CAN_EXTEND_BASE=true
      - SERVER_ROLE_1_RESERVED_SLOTS=3
      - SERVER_GS_PRESET=Custom
      - SERVER_GS_FACTORY_PRODUCTION_SPEED_FACTOR=2
    deploy:
      resources:
        limits:
          cpus: "12.0"
          memory: 8G
        reservations:
          cpus: "4.0"
          memory: 4G
    # networks:
    #   homeserver_default:
    #     ipv4_address: 172.18.0.7
    restart: unless-stopped
