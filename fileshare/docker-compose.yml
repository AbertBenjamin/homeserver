services:
  samba:
    image: dockurr/samba:4.23.5
    container_name: samba
    environment:
      USER: "${fileshare_username}"
      PASS: "${fileshare_password}"
    ports:
      - "445:445"
    volumes:
      - /mnt/storage:/storage
    networks:
      homeserver_default:
        ipv4_address: 172.18.0.6
    restart: unless-stopped
